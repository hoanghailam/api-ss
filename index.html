<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tags for SEO & Social Sharing -->
    <title>Mineasset - Minecraft Asset Library</title>
    <meta name="description" content="A fast and modern interface to browse and download assets from Minecraft and other block-based games. Select multiple assets and download them as a ZIP file.">
    <meta name="keywords" content="Minecraft, Assets, Textures, Download, Library, Blockman GO, Mineasset">
    <meta name="author" content="Mineasset">
    <!-- Open Graph Tags (for Facebook, etc.) -->
    <meta property="og:title" content="Mineasset - Asset Library">
    <meta property="og:description" content="Browse and download Minecraft assets with a modern, fast interface.">
    <meta property="og:image" content="https://images.icon-icons.com/2699/PNG/512/minecraft_logo_icon_168974.png">
    <meta property="og:url" content="https://your-website-url.com"> <!-- Replace with your actual URL when deployed -->
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#2E2E2E">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://images.icon-icons.com/2699/PNG/512/minecraft_logo_icon_168974.png">
    <link rel="apple-touch-icon" href="https://images.icon-icons.com/2699/PNG/512/minecraft_logo_icon_168974.png">
    
    <!-- Library for Zipping Files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Lenis Smooth Scroll Library -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    
    <!-- Google Fonts: Poppins & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #212121;
            --surface-color: #2E2E2E;
            --surface-hover: #3c3c3c;
            --border-color: #444446;
            --text-color: #f2f2f7;
            --text-muted-color: #8e8e93;
            --accent-color: #34D399;
            --accent-hover: #2cb580;
            --font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-stopped { overflow: hidden; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 120px 20px; /* Increased bottom padding for download bar */
        }
        .container { max-width: 1200px; margin: auto; text-align: center; }
        .header {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-top: 20px; margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out both;
        }
        .header img { width: 50px; height: 50px; }
        h1 { font-size: 2.8em; font-weight: 700; color: var(--text-color); margin: 0; }
        .search-wrapper { position: relative; max-width: 600px; margin: 0 auto; animation: fadeIn 0.5s 0.2s ease-out both; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: var(--text-muted-color); pointer-events: none; }
        #search-input { width: 100%; padding: 14px 20px 14px 50px; font-size: 1.1em; font-family: var(--font-family); border: none; border-radius: 12px; background-color: var(--surface-color); color: var(--text-color); transition: all 0.2s ease-in-out; box-sizing: border-box; }
        #search-input:focus { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-color) 25%, transparent); }
        .info-bar { margin: 15px 0 35px 0; font-size: 0.9em; animation: fadeIn 0.5s 0.3s ease-out both; }
        #view-json-link { color: var(--accent-color); text-decoration: none; font-weight: 500; }
        #view-json-link:hover { text-decoration: underline; }
        .tab-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; animation: fadeIn 0.5s 0.1s ease-out both; }
        .tab-button { padding: 10px 25px; font-size: 1em; font-family: var(--font-family); font-weight: 600; border: none; background-color: var(--surface-color); color: var(--text-muted-color); border-radius: 999px; cursor: pointer; transition: all 0.2s ease; }
        .tab-button:hover { background-color: var(--surface-hover); color: var(--text-color); }
        .tab-button.active { background-color: var(--accent-color); color: #111; cursor: default; }
        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; min-height: 200px; position: relative; }
        
        /* --- Block Card & Selection Styling --- */
        .block-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer; position: relative;
            opacity: 0; animation: fadeIn 0.5s ease-out forwards;
            border: 2px solid transparent; /* Placeholder for selection border */
        }
        .block-card:hover {
            transform: translateY(-4px);
            background-color: var(--surface-hover);
        }
        .block-card.selected {
            background-color: var(--surface-hover);
            border-color: var(--accent-color);
        }
        .block-card .checkmark {
            position: absolute; top: 10px; right: 10px;
            width: 24px; height: 24px;
            background-color: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0);
            transition: transform 0.2s ease-in-out;
        }
        .block-card.selected .checkmark {
            transform: scale(1);
        }
        .block-card .checkmark svg {
            width: 16px; height: 16px;
            fill: var(--accent-color);
        }
        .block-card img { width: 64px; height: 64px; image-rendering: pixelated; pointer-events: none; }
        .block-card p { margin-top: 15px; font-size: 0.85em; color: var(--text-muted-color); word-break: break-word; text-align: center; line-height: 1.3; pointer-events: none; }
        
        #message { grid-column: 1 / -1; font-style: italic; color: var(--text-muted-color); padding: 40px 0; }
        .loader { position: absolute; left: 50%; top: 50px; transform: translateX(-50%); width: 50px; height: 50px; border: 5px solid var(--surface-hover); border-bottom-color: var(--accent-color); border-radius: 50%; display: none; animation: rotation 1s linear infinite; }
        .loader.visible { display: inline-block; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Floating Download Bar --- */
        #download-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translate(-50%, 150%);
            width: auto;
            max-width: 90%;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #download-bar.visible {
            transform: translate(-50%, 0);
        }
        #download-count {
            color: var(--text-muted-color);
            font-weight: 500;
            padding: 0 10px;
        }
        #multi-download-button {
            padding: 10px 25px;
            font-family: var(--font-family);
            font-weight: 600;
            background-color: var(--accent-color);
            color: #111;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #multi-download-button:hover {
            background-color: var(--accent-hover);
        }
        #multi-download-button:disabled {
            background-color: var(--surface-hover);
            color: var(--text-muted-color);
            cursor: not-allowed;
        }
        
        @media (max-width: 600px) {
            body { padding: 15px 15px 120px 15px; }
            .header img { width: 40px; height: 40px; }
            h1 { font-size: 2.2em; }
            .tab-button { padding: 8px 20px; }
            #results-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://images.icon-icons.com/2699/PNG/512/minecraft_logo_icon_168974.png" alt="Minecraft Logo">
            <h1>Mineasset</h1>
        </div>
        <div class="tab-container" id="tab-container"></div>
        <div class="search-wrapper">
             <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"/></svg>
            <input type="search" id="search-input" placeholder="Select a library to search...">
        </div>
        <div class="info-bar">
            <a id="view-json-link" href="#" target="_blank" rel="noopener noreferrer">View Source JSON</a>
        </div>
        <div id="results-grid">
            <div id="loader" class="loader"></div>
            <p id="message">Please select a library above.</p>
        </div>
    </div>

    <!-- Floating Download Bar -->
    <div id="download-bar">
        <span id="download-count">0 items selected</span>
        <button id="multi-download-button">Download ZIP</button>
    </div>

    <script>
        // --- CONFIGURATION & STATE ---
        const SOURCES = {
            'bmg': { name: 'Blockman GO', url: 'https://cdn.jsdelivr.net/gh/itzst6v6/mineasset@blockman/block_structure.json' },
            'mc': { name: 'Minecraft', url: 'https://cdn.jsdelivr.net/gh/itzst6v6/mineasset@minecraft/block_structure.json' }
        };
        let activeSourceId = null;
        const assetCache = {};
        const selectedItems = new Set();

        // --- ELEMENTS ---
        const tabContainer = document.getElementById('tab-container');
        const searchInput = document.getElementById('search-input');
        const resultsGrid = document.getElementById('results-grid');
        const messageEl = document.getElementById('message');
        const loaderEl = document.getElementById('loader');
        const viewJsonLink = document.getElementById('view-json-link');
        const downloadBar = document.getElementById('download-bar');
        const downloadCount = document.getElementById('download-count');
        const multiDownloadButton = document.getElementById('multi-download-button');

        // --- FUNCTIONS ---
        function renderBlocks(blocksToRender) {
            resultsGrid.innerHTML = '';
            const blockKeys = Object.keys(blocksToRender); 
            
            if (blockKeys.length === 0) {
                messageEl.textContent = 'No results found.';
                resultsGrid.appendChild(messageEl);
                return;
            }
            
            let delay = 0;
            for (const filename of blockKeys) {
                const block = blocksToRender[filename];
                const card = document.createElement('div');
                card.className = 'block-card';
                card.dataset.filename = filename;
                card.style.animationDelay = `${delay}s`;
                
                // Check if this item is already selected
                if (selectedItems.has(filename)) {
                    card.classList.add('selected');
                }
                
                card.innerHTML = `
                    <div class="checkmark">
                        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path></svg>
                    </div>
                    <img src="${block.textureUrl}" alt="${block.name}" loading="lazy">
                    <p>${block.name}</p>
                `;
                resultsGrid.appendChild(card);
                if (delay < 0.5) delay += 0.02;
            }
        }

        async function fetchAssets(sourceId) {
            resultsGrid.innerHTML = '';
            loaderEl.classList.add('visible');
            resultsGrid.appendChild(loaderEl);
            searchInput.disabled = true;
            if (assetCache[sourceId]) {
                renderBlocks(assetCache[sourceId].blocks);
                loaderEl.classList.remove('visible');
                searchInput.disabled = false;
                return;
            }
            try {
                const response = await fetch(SOURCES[sourceId].url);
                const data = await response.json();
                assetCache[sourceId] = data;
                renderBlocks(data.blocks);
                searchInput.placeholder = `Search in ${SOURCES[sourceId].name}...`;
            } catch (error) {
                console.error("Failed to fetch assets:", error);
                messageEl.textContent = `Error: Could not load the ${SOURCES[sourceId].name} library.`;
                resultsGrid.appendChild(messageEl);
            } finally {
                loaderEl.classList.remove('visible');
                searchInput.disabled = false;
            }
        }

        function handleSearch() { /* (Unchanged) */ }
        function handleTabClick(event) {
            const newSourceId = event.target.dataset.source;
            if (newSourceId === activeSourceId) return;
            activeSourceId = newSourceId;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            viewJsonLink.href = SOURCES[activeSourceId].url;
            searchInput.value = '';
            
            // Clear selection when switching tabs
            selectedItems.clear();
            updateDownloadBar();

            fetchAssets(activeSourceId);
        }

        function toggleItemSelection(card) {
            const filename = card.dataset.filename;
            if (!filename) return;

            card.classList.toggle('selected');
            if (selectedItems.has(filename)) {
                selectedItems.delete(filename);
            } else {
                selectedItems.add(filename);
            }
            updateDownloadBar();
        }

        function updateDownloadBar() {
            const count = selectedItems.size;
            if (count > 0) {
                downloadCount.textContent = `${count} item${count > 1 ? 's' : ''} selected`;
                downloadBar.classList.add('visible');
            } else {
                downloadBar.classList.remove('visible');
            }
        }

        async function handleMultiDownload() {
            if (selectedItems.size === 0) return;

            multiDownloadButton.disabled = true;
            multiDownloadButton.textContent = 'Zipping...';

            const zip = new JSZip();
            const currentBlocks = assetCache[activeSourceId].blocks;

            const fetchPromises = Array.from(selectedItems).map(filename => {
                const block = currentBlocks[filename];
                return fetch(block.textureUrl)
                    .then(response => {
                        if (!response.ok) throw new Error(`Failed to fetch ${filename}`);
                        return response.blob();
                    })
                    .then(blob => {
                        zip.file(filename, blob);
                    });
            });

            try {
                await Promise.all(fetchPromises);
                const zipBlob = await zip.generateAsync({ type: 'blob' });

                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = `Mineasset_Download.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                // Clear selection after download
                document.querySelectorAll('.block-card.selected').forEach(card => card.classList.remove('selected'));
                selectedItems.clear();
                updateDownloadBar();

            } catch (error) {
                console.error('Failed to create ZIP file:', error);
                alert('An error occurred while creating the ZIP file. Please check the console for details.');
            } finally {
                multiDownloadButton.disabled = false;
                multiDownloadButton.textContent = 'Download ZIP';
            }
        }
        
        // --- INITIALIZATION ---
        function init() {
            for (const sourceId in SOURCES) {
                const button = document.createElement('button');
                button.className = 'tab-button';
                button.textContent = SOURCES[sourceId].name;
                button.dataset.source = sourceId;
                button.addEventListener('click', handleTabClick);
                tabContainer.appendChild(button);
            }
            const minecraftTab = document.querySelector('.tab-button[data-source="mc"]');
            if (minecraftTab) minecraftTab.click();

            searchInput.addEventListener('input', () => {
                // This is a simplified search render logic that re-uses fetchAssets's power
                if (!activeSourceId || !assetCache[activeSourceId]) return;
                const searchTerm = searchInput.value.toLowerCase().trim();
                const allBlocks = assetCache[activeSourceId].blocks;
                if (!searchTerm) {
                    renderBlocks(allBlocks);
                    return;
                }
                const filteredBlocks = Object.fromEntries(
                    Object.entries(allBlocks).filter(([filename, block]) => 
                        block.name.toLowerCase().includes(searchTerm) || 
                        filename.toLowerCase().includes(searchTerm) ||
                        (block.tags && block.tags.some(tag => tag.toLowerCase().includes(searchTerm)))
                    )
                );
                renderBlocks(filteredBlocks);
            });
            resultsGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.block-card');
                if (card) toggleItemSelection(card);
            });
            multiDownloadButton.addEventListener('click', handleMultiDownload);
        }

        // --- Lenis Smooth Scroll ---
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        init();
    </script>
</body>
</html>
